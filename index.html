function renderLesson() {
  const l = LESSONS[currentIdx];
  document.getElementById('lessonBadge').textContent = 'Lesson ' + l.n;
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').disabled = currentIdx === LESSONS.length - 1;

  const exScore = scores[currentIdx] || { correct: 0, total: l.exercises.length, answered: 0 };

  let html = `
    <div class="lesson-header">
      <div class="lesson-tag">Phase 1 • Lesson ${l.n}</div>
      <h1 class="lesson-title">${l.title}</h1>
      <p class="lesson-obj">🎯 ${l.obj}</p>
    </div>
  `;

  // Score bar
  const pct = exScore.total > 0 ? Math.round(exScore.correct / exScore.total * 100) : 0;
  html += `<div class="score-bar">
    <div>
      <div class="score-label">Exercise Score</div>
      <div class="score-val">${exScore.correct}/${exScore.total}</div>
    </div>
    <div class="score-track"><div class="score-fill" style="width:${pct}%"></div></div>
    <button class="score-reset" onclick="resetLesson()">↺ Reset</button>
  </div>`;

  // Vocab
  html += `<div class="section">
    <div class="section-header" onclick="toggleSection('vocab')">
      <div class="section-icon">📚</div>
      <span class="section-label">Vocabulary (${l.vocab.length} words)</span>
      <span class="section-toggle" id="tog_vocab">▲</span>
    </div>
    <div class="section-body" id="sec_vocab">
      <div class="vocab-grid">`;
  l.vocab.forEach(([en, es]) => {
    html += `<div class="vocab-card" onclick="speak('${en.replace(/'/g,"\\'")}')">
      <div class="vocab-en">${en}</div>
      <div class="vocab-es">${es}</div>
      <div class="speak-icon">🔊 tap to hear</div>
    </div>`;
  });
  html += '</div></div></div>';

  // Grammar
  html += `<div class="section">
    <div class="section-header" onclick="toggleSection('grammar')">
      <div class="section-icon">📐</div>
      <span class="section-label">Grammar Focus</span>
      <span class="section-toggle" id="tog_grammar">▲</span>
    </div>
    <div class="section-body" id="sec_grammar">
      <div class="grammar-rule">
        <div class="grammar-rule-label">Rule</div>
        <div class="grammar-rule-text">${l.grammar.rule}</div>
      </div>
      <ul class="examples-list">`;
  l.grammar.examples.forEach(ex => {
    html += `<li class="example-item">
      <span class="example-dot">▸</span>
      <span>${ex}</span>
      <button class="example-speak" onclick="speak('${ex.replace(/'/g,"\\'")}')">🔊</button>
    </li>`;
  });
  html += '</ul></div></div>';

  // Exercises
  html += `<div class="section">
    <div class="section-header" onclick="toggleSection('exercises')">
      <div class="section-icon">✏️</div>
      <span class="section-label">Exercises</span>
      <span class="section-toggle" id="tog_exercises">▲</span>
    </div>
    <div class="section-body" id="sec_exercises">`;

  l.exercises.forEach((ex, ei) => {
    const exId = 'ex_' + currentIdx + '_' + ei;
    if (ex.type === 'quiz') {
      html += `<div class="exercise" id="${exId}_wrap">
        <div class="ex-num">Question ${ei+1}</div>
        <div class="ex-q">${ex.q}</div>
        <div class="opts">`;
      ex.opts.forEach((opt, oi) => {
        html += `<button class="opt-btn" id="${exId}_opt${oi}" onclick="answerQuiz('${exId}',${oi},${ex.ans})">${opt}</button>`;
      });
      html += `</div><div class="feedback" id="${exId}_fb"></div></div>`;
    } else {
      html += `<div class="exercise" id="${exId}_wrap">
        <div class="ex-num">Question ${ei+1}</div>
        <div class="ex-q">${ex.q}</div>
        <div class="fill-wrap">
          <input class="fill-input" id="${exId}_inp" placeholder="Type your answer…"
            onkeydown="if(event.key==='Enter')checkFill('${exId}',${JSON.stringify(ex.blank).replace(/"/g,'&quot;')})">
          <button class="check-btn" onclick="checkFill('${exId}',${JSON.stringify(ex.blank).replace(/"/g,'&quot;')})">Check</button>
        </div>
        <div class="fill-hint">💡 Hint: ${ex.hint}</div>
        <div class="feedback" id="${exId}_fb"></div>
      </div>`;
    }
  });
  html += '</div></div>';

  // Speaking Practice
  html += `<div class="section">
    <div class="section-header" onclick="toggleSection('speaking')">
      <div class="section-icon">🎤</div>
      <span class="section-label">Speaking Practice</span>
      <span class="section-toggle" id="tog_speaking">▲</span>
    </div>
    <div class="section-body" id="sec_speaking">
      <div class="speak-grid">`;
  l.speak.forEach(s => {
    html += `<div class="speak-row">
      <span class="speak-text">${s}</span>
      <button class="speak-play" onclick="speakPhrase(this,'${s.replace(/'/g,"\\'")}')">🔊 Listen & Repeat</button>
    </div>`;
  });
  html += '</div></div></div>';

  // Tip
  html += `<div class="tip-box">
    <div class="tip-icon">💡</div>
    <div class="tip-text">${l.tip}</div>
  </div>`;

  // Complete button
  html += `<div style="margin-top:24px;text-align:center;">
    <button onclick="markComplete()" style="padding:14px 36px;background:var(--brand);border:none;border-radius:10px;
      color:#fff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;
      transition:all 0.2s;letter-spacing:-0.2px;" id="completeBtn">
      ${completed.has(currentIdx) ? '✓ Completed – Next Lesson →' : '✅ Mark Complete'}
    </button>
  </div>`;

  document.getElementById('mainContent').innerHTML = html;
}

function answerQuiz(exId, chosen, correct) {
  const opts = document.querySelectorAll('[id^="' + exId + '_opt"]');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct-ans');
    if (i === chosen && i !== correct) btn.classList.add('wrong-ans');
  });
  const fb = document.getElementById(exId + '_fb');
  const wrap = document.getElementById(exId + '_wrap');
  const exIdx = parseInt(exId.split('_')[2]);
  if (!scores[currentIdx]) scores[currentIdx] = { correct: 0, total: LESSONS[currentIdx].exercises.length, answered: 0 };
  if (scores[currentIdx].answered <= exIdx) {
    scores[currentIdx].answered = exIdx + 1;
    if (chosen === correct) {
      scores[currentIdx].correct++;
      fb.textContent = '✓ Correct! ' + (LESSONS[currentIdx].exercises[exIdx].opts ? LESSONS[currentIdx].exercises[exIdx].opts[correct] : '');
      fb.className = 'feedback show ok';
      wrap.classList.add('correct');
    } else {
      fb.textContent = '✗ The correct answer is: ' + (LESSONS[currentIdx].exercises[exIdx].opts ? LESSONS[currentIdx].exercises[exIdx].opts[correct] : '');
      fb.className = 'feedback show no';
      wrap.classList.add('wrong');
    }
    updateScoreBar();
    saveState();
  }
}

function checkFill(exId, answer) {
  const inp = document.getElementById(exId + '_inp');
  const fb = document.getElementById(exId + '_fb');
  const wrap = document.getElementById(exId + '_wrap');
  const val = inp.value.trim().toLowerCase();
  const ans = answer.toString().toLowerCase();
  const exIdx = parseInt(exId.split('_')[2]);
  if (val === '') return;
  if (!scores[currentIdx]) scores[currentIdx] = { correct: 0, total: LESSONS[currentIdx].exercises.length, answered: 0 };
  if (scores[currentIdx].answered <= exIdx) {
    scores[currentIdx].answered = exIdx + 1;
    inp.disabled = true;
    if (val === ans || ans === '(any letter)' || ans === '(your age)' || ans === '(today\'s day)' || ans === '(your day)' || val.includes(ans) || ans.includes(val)) {
      inp.classList.add('correct');
      fb.textContent = '✓ Correct! Well done!';
      fb.className = 'feedback show ok';
      wrap.classList.add('correct');
      scores[currentIdx].correct++;
    } else {
      inp.classList.add('wrong');
      fb.textContent = '✗ The answer is: ' + answer;
      fb.className = 'feedback show no';
      wrap.classList.add('wrong');
    }
    updateScoreBar();
    saveState();
  }
}

function updateScoreBar() {
  const s = scores[currentIdx] || { correct: 0, total: LESSONS[currentIdx].exercises.length };
  const pct = Math.round(s.correct / s.total * 100);
  const scoreVal = document.querySelector('.score-val');
  const scoreFill = document.querySelector('.score-fill');
  if (scoreVal) scoreVal.textContent = s.correct + '/' + s.total;
  if (scoreFill) scoreFill.style.width = pct + '%';
}

function resetLesson() {
  delete scores[currentIdx];
  completed.delete(currentIdx);
  saveState();
  renderLesson();
  buildSidebar();
}

function markComplete() {
  completed.add(currentIdx);
  saveState();
  buildSidebar();
  if (currentIdx < LESSONS.length - 1) {
    setTimeout(() => navigate(1), 300);
  } else {
    document.getElementById('completeBtn').textContent = '🎉 Phase Complete!';
  }
}

function speakPhrase(btn, text) {
  btn.classList.add('playing');
  const u = speak(text);
  if (u) u.onend = () => btn.classList.remove('playing');
  setTimeout(() => btn.classList.remove('playing'), 4000);
}

// Init
buildSidebar();
renderLesson();
</script>
</body>
</html>
